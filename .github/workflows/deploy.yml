name: Deploy to GitHub Pages

on:
  # Löst den Build bei jedem Push auf den Haupt-Branch aus
  push:
    branches: [ main, master ]
  # Erlaubt es dir, den Workflow auch manuell über GitHub zu starten
  workflow_dispatch:

# Notwendige Berechtigungen für GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install, build, and upload your Astro site
        uses: withastro/action@v3
        with:
          node-version: 22
          package-manager: npm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
