name: Build and Deploy to Production Branch

on:
  # Trigger build on push to main or master
  push:
    branches: [ main, master ]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Grant permission to write contents back to the repo (needed to push the build)
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: production-build

